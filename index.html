<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウエル活マスター</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🛒 ウエル活マスター</h1>
<p>毎月のウエル活をもっとお得に！</p>
</header>

<main>

<section class="card">
<h2>💰 合計金額</h2>

<div id="totalPrice">
0円
</div>

<p id="nextTarget">
あと10,000円で10,000円達成！
</p>
</section>

<section class="card">
<h2>🛍 商品一覧</h2>

<div id="itemList">
商品はありません
</div>

<button id="addButton">
＋ 商品追加
</button>

</section>

<section class="card">

<h2>💳 おすすめ支払い</h2>

<p>PayPay：<span id="paypay">0円</span></p>

<p>WAON POINT：<span id="waon">0pt</span></p>

<p>PayPay還元：<span id="reward">0pt</span></p>

</section>

<section class="card">

<h2>🎁 レシチャレ</h2>

<p>還元額：<span id="cashback">0円</span></p>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
